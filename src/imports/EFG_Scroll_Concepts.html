<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EFG Hermes Research — Scroll Concepts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>/* EFG Research Portal — Scroll Concept Prototype
   Palette based on EFG Holding Brand Manual V01 (2023):
   - Emerald #124734 (primary)
   - Metallic Gray #E3E3E2, Charcoal #A7A6A6 (secondary)
   - White #FFFFFF, Black #1D1D1B (base)
   - Calcite Orange #FF8200 (accent — used sparingly for live state) */

:root {
  /* Emerald base, darkened for hero sections */
  --bg: #0B2218;              /* deep emerald-black */
  --bg-2: #124734;            /* EFG Emerald primary */
  --bg-3: #1A5A43;            /* hover / lift */
  --emerald: #124734;
  --emerald-deep: #0B2218;

  --ink: #FFFFFF;
  --ink-dim: #E3E3E2;         /* Metallic Gray */
  --ink-faint: rgba(227, 227, 226, 0.55);
  --ink-mute: #A7A6A6;        /* Charcoal Gray */

  --rule: rgba(227, 227, 226, 0.14);
  --rule-strong: rgba(227, 227, 226, 0.26);

  --accent: #FF8200;           /* Calcite Orange — EFG subsidiary accent */
  --accent-deep: #C66400;

  --green: #00BC71;            /* Malachite Green — positive */
  --blue:  #0085CA;            /* Skyline Blue — informational */
  --red:   #D45845;            /* derived warm red for negative */

  --serif: 'Newsreader', 'Source Serif 4', Georgia, serif;
  --sans:  'Inter Tight', 'Inter', system-ui, sans-serif;
  --mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;
}

/* ===== LIGHT THEME ===== */
[data-theme="light"] {
  --bg: #F5F3EC;              /* warm parchment */
  --bg-2: #FFFFFF;            /* card surface */
  --bg-3: #EDEAE0;            /* lift */
  --ink: #1D1D1B;
  --ink-dim: #3A3A36;
  --ink-faint: rgba(29,29,27,0.55);
  --ink-mute: #6E6E68;
  --rule: rgba(29,29,27,0.10);
  --rule-strong: rgba(29,29,27,0.22);
}
[data-theme="light"] .nav {
  background: linear-gradient(180deg, rgba(245,243,236,0.92) 0%, rgba(245,243,236,0) 100%);
}
[data-theme="light"] .nav-logo .mark { border-color: rgba(0,0,0,0.08); }
[data-theme="light"] .btn-primary { background: var(--emerald); color: #fff; }
[data-theme="light"] .btn-primary:hover { background: #1A5A43; }
[data-theme="light"] .nav-cta:hover { background: var(--emerald); color: #fff; border-color: var(--emerald); }
[data-theme="light"] .tweaks-panel {
  background: rgba(255,255,255,0.96);
  color: #1D1D1B;
  box-shadow: 0 24px 60px rgba(0,0,0,0.12);
}
[data-theme="light"] .tweak-toggle { background: rgba(0,0,0,0.03); }
[data-theme="light"] .tweak-toggle button { color: #555; }
[data-theme="light"] .dots {
  background-image: radial-gradient(circle, rgba(29,29,27,0.10) 1px, transparent 1px);
}
[data-theme="light"] .gridlines {
  background-image:
    linear-gradient(to right, rgba(29,29,27,0.08) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(29,29,27,0.08) 1px, transparent 1px);
}
[data-theme="light"] .card { background: #FFFFFF; }
[data-theme="light"] .scroll-rail .chapter { color: rgba(29,29,27,0.45); }
[data-theme="light"] .scroll-rail .chapter:hover { color: #1D1D1B; }
[data-theme="light"] .section-label { color: var(--emerald); }
[data-theme="light"] .section-label::before { background: var(--emerald); box-shadow: 0 0 0 4px rgba(18,71,52,0.16); }
[data-theme="light"] .nav-logo .mark { background: var(--emerald); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); }
html { scroll-behavior: auto; }
body {
  font-feature-settings: "ss01", "ss02", "cv11";
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
.serif { font-family: var(--serif); font-weight: 400; }
.caps { text-transform: uppercase; letter-spacing: 0.14em; font-size: 11px; }

.shell { max-width: 1360px; margin: 0 auto; padding: 0 56px; }
@media (max-width: 820px) { .shell { padding: 0 24px; } }

/* ===== Top nav ===== */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 56px;
  background: linear-gradient(180deg, rgba(11,34,24,0.88) 0%, rgba(11,34,24,0) 100%);
  backdrop-filter: blur(8px);
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.01em; }
.nav-logo .mark {
  width: 24px; height: 24px; border-radius: 4px;
  background: var(--emerald);
  border: 1px solid rgba(255,255,255,0.12);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 13px; color: var(--ink);
}
.nav-logo .mark::after {
  content: "EFG";
  font-family: var(--sans); font-weight: 700; font-size: 8px;
  letter-spacing: 0.05em;
  color: var(--ink);
}
.nav-links { display: flex; gap: 26px; font-size: 13px; color: var(--ink-dim); }
.nav-links a:hover { color: var(--ink); }
.nav-cta {
  padding: 8px 14px; border: 1px solid var(--rule-strong); border-radius: 2px;
  font-size: 12px; letter-spacing: 0.02em;
}
.nav-cta:hover { background: var(--accent); color: #1D1D1B; border-color: var(--accent); }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 22px; border-radius: 2px; font-size: 13px; font-weight: 500;
  border: 1px solid transparent; cursor: pointer; transition: all .2s ease;
  letter-spacing: 0.01em;
}
.btn-primary { background: var(--accent); color: #1D1D1B; }
.btn-primary:hover { background: #FFA040; }
.btn-ghost { border-color: var(--rule-strong); color: var(--ink); }
.btn-ghost:hover { border-color: var(--ink); }

/* ===== Section scaffolding ===== */
.section-label {
  display: flex; align-items: center; gap: 10px;
  color: var(--accent); font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.16em;
  margin-bottom: 18px;
}
.section-label::before {
  content: ""; width: 6px; height: 6px; background: var(--accent);
  box-shadow: 0 0 0 4px rgba(255,130,0,0.18);
}
h1, h2, h3 { margin: 0; letter-spacing: -0.02em; }
h1.hero-title {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(48px, 7.2vw, 112px);
  line-height: 0.96;
  letter-spacing: -0.035em;
}
h2.section-title {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(38px, 5vw, 72px);
  line-height: 1.02; letter-spacing: -0.025em;
}
.lede { color: var(--ink-dim); font-size: 18px; line-height: 1.5; max-width: 58ch; }

/* ===== Ticker ===== */
.ticker {
  display: flex; gap: 32px; padding: 12px 0;
  border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  overflow: hidden; white-space: nowrap;
  font-family: var(--mono); font-size: 12px;
}
.ticker-track {
  display: inline-flex; gap: 32px; animation: tick 60s linear infinite;
}
.ticker-item { display: inline-flex; gap: 8px; align-items: center; }
.ticker-item .sym { color: var(--ink); }
.ticker-item .val { color: var(--ink-dim); }
.ticker-item .up { color: var(--green); }
.ticker-item .dn { color: var(--red); }
@keyframes tick { to { transform: translateX(-50%); } }

/* ===== Dot pattern backdrop ===== */
.dots {
  background-image: radial-gradient(circle, rgba(227,227,226,0.08) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* Gridlines for data flavor */
.gridlines {
  background-image:
    linear-gradient(to right, var(--rule) 1px, transparent 1px),
    linear-gradient(to bottom, var(--rule) 1px, transparent 1px);
  background-size: 80px 80px;
}

/* ===== Pinned section container ===== */
.pinned { position: relative; }
.pinned .sticky { position: sticky; top: 0; height: 100vh; overflow: hidden; }

/* ===== Tweaks panel ===== */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px; z-index: 100;
  width: 300px; background: rgba(11,34,24,0.94); backdrop-filter: blur(16px);
  border: 1px solid var(--rule-strong); border-radius: 4px;
  padding: 16px; font-size: 13px; color: var(--ink);
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.tweaks-panel h3 { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.tweak-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid var(--rule); }
.tweak-row:first-of-type { border-top: none; }
.tweak-row label { color: var(--ink-dim); font-size: 12px; }
.tweak-toggle {
  display: inline-flex; background: rgba(255,255,255,0.04); border-radius: 2px; padding: 3px; gap: 2px;
  border: 1px solid var(--rule);
}
.tweak-toggle button {
  background: transparent; color: var(--ink-dim); border: none; padding: 4px 10px;
  font-size: 11px; font-family: var(--mono); cursor: pointer; border-radius: 2px;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.tweak-toggle button.on { background: var(--accent); color: #1D1D1B; }

/* ===== Progress indicator (right edge) ===== */
.scroll-rail {
  position: fixed; right: 18px; top: 50%; transform: translateY(-50%);
  z-index: 40; display: flex; flex-direction: column; gap: 10px;
  font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
}
.scroll-rail .chapter {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  transition: color .2s;
}
.scroll-rail .chapter:hover { color: var(--ink); }
.scroll-rail .chapter .tick {
  width: 22px; height: 1px; background: currentColor; opacity: 0.4;
}
.scroll-rail .chapter.active { color: var(--accent); }
.scroll-rail .chapter.active .tick { height: 2px; width: 34px; opacity: 1; }

/* ===== Misc ===== */
.fadein { opacity: 0; transform: translateY(20px); transition: all .8s cubic-bezier(.2,.7,.2,1); }
.fadein.in { opacity: 1; transform: translateY(0); }

/* ============================================================
   MOBILE RESPONSIVE  (< 820px)
   ============================================================ */
@media (max-width: 820px) {
  /* Nav — hide inline links, show compact CTA */
  .nav { padding: 14px 20px; }
  .nav-links { display: none; }
  .nav-logo span { font-size: 13px; }
  .nav-cta { padding: 6px 10px; font-size: 11px; }

  /* Section scaffolding */
  h1.hero-title { font-size: clamp(40px, 11vw, 68px); line-height: 1.0; letter-spacing: -0.03em; }
  h2.section-title { font-size: clamp(32px, 9vw, 52px); line-height: 1.05; }
  .lede { font-size: 15px; }
  .section-label { font-size: 10px; }

  /* Scroll rail — hide on mobile, real estate is precious */
  .scroll-rail { display: none; }

  /* Tweaks panel — bottom sheet */
  .tweaks-panel {
    right: 10px; left: 10px; bottom: 10px;
    width: auto; max-height: 60vh; overflow-y: auto;
    padding: 14px;
  }

  /* Buttons get taller (44px hit targets) */
  .btn { padding: 14px 22px; font-size: 14px; }

  /* Ticker tightens */
  .ticker { font-size: 11px; gap: 20px; padding: 10px 0; }
  .ticker-track { gap: 20px; }
}

/* Also at narrow viewports, neutralize the translateX scroll animations */
@media (max-width: 820px) {
  h1.hero-title span {
    transform: none !important;
    opacity: 1 !important;
  }
}

/* Extra small phones */
@media (max-width: 480px) {
  .nav { padding: 12px 16px; }
  .shell { padding: 0 18px !important; }
  h1.hero-title { font-size: clamp(36px, 10vw, 56px); }
}

/* Horizontal-scroll pinned sections don't work well on mobile —
   give them a fallback: remove pinning, stack naturally. */
@media (max-width: 820px) {
  .pinned { height: auto !important; }
  .pinned .sticky {
    position: relative;
    height: auto;
    min-height: auto;
    padding: 120px 20px 60px !important;
  }
  /* Neutralize absolute positioning on mobile — stack children */
  .pinned .sticky > div[style*="position: absolute"],
  .pinned .sticky > div[style*="position:absolute"] {
    position: relative !important;
    inset: auto !important;
    opacity: 1 !important;
    transform: none !important;
    display: block !important;
    pointer-events: auto !important;
  }
  h1.hero-title span {
    transform: none !important;
    opacity: 1 !important;
  }
  /* Hide decorative layers that only make sense with scroll animations */
  .pinned .sticky .gridlines { display: none; }
}

/* Extra small phones */
@media (max-width: 480px) {
  .nav { padding: 12px 16px; }
  .shell { padding: 0 18px !important; }
  h1.hero-title { font-size: clamp(36px, 10vw, 56px); }
}

/* Mobile preview frame */
[data-device="mobile"] body {
  background: #1D1D1B;
  padding: 40px 0;
  min-height: 100vh;
}
[data-device="mobile"] #root {
  width: 390px;
  margin: 0 auto;
  background: var(--bg);
  border-radius: 36px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 10px #0A0A0A, 0 0 0 11px #2A2A2A;
  position: relative;
  min-height: 800px;
}
[data-device="mobile"] #root::before {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);

  border-radius: 0 0 18px 18px; z-index: 100;
}
[data-device="mobile"] .nav {
  position: absolute !important;
  padding: 14px 20px;
}
[data-device="mobile"] .nav-links { display: none; }
[data-device="mobile"] .nav-logo span { font-size: 13px; }
[data-device="mobile"] .nav-cta { padding: 6px 10px; font-size: 11px; }
[data-device="mobile"] .scroll-rail { display: none; }
[data-device="mobile"] h1.hero-title { font-size: 44px !important; line-height: 1.0; letter-spacing: -0.03em; }

[data-device="mobile"] .lede { font-size: 15px !important; }
[data-device="mobile"] .shell { padding: 0 20px !important; }
[data-device="mobile"] .pinned { height: auto !important; }

  position: relative !important;

  min-height: auto !important;

}
[data-device="mobile"] .pinned .sticky > div[style*="position: absolute"],
[data-device="mobile"] .pinned .sticky > div[style*="position:absolute"] {
  position: relative !important;
  inset: auto !important;
  opacity: 1 !important;
  transform: none !important;

}
[data-device="mobile"] h1.hero-title span {
  transform: none !important;

}

[data-device="mobile"] .ticker-track { gap: 16px; }

/* Grids collapse */
[data-device="mobile"] [style*="grid-template-columns"] {
  grid-template-columns: 1fr !important;
}
@media (max-width: 820px) {
  [style*="grid-template-columns: repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
  [style*="grid-template-columns: repeat(3"] { grid-template-columns: 1fr !important; }

  [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
  [style*="grid-template-columns: 180px 1fr 260px"] { grid-template-columns: 1fr !important; }
}

[data-device="mobile"] .tweaks-panel {
  position: fixed; right: 10px; left: 10px; bottom: 10px;
  width: auto; max-height: 50vh; overflow-y: auto;
}
[data-device="mobile"] #root::before {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);

}
[data-device="mobile"] .nav { padding: 14px 20px; left: 0; right: 0; }

[data-device="mobile"] h2.section-title { font-size: 34px !important; line-height: 1.05; }
[data-device="mobile"] .lede { font-size: 15px !important; }
[data-device="mobile"] .shell { padding: 0 20px !important; }
[data-device="mobile"] .pinned { height: auto !important; }
[data-device="mobile"] .pinned .sticky {
  position: relative !important;
  height: auto !important;
  min-height: 600px;
  padding: 60px 20px !important;
}
[data-device="mobile"] .ticker { font-size: 11px; gap: 20px; padding: 10px 0; }
[data-device="mobile"] .tweaks-panel {
  position: fixed; right: 10px; left: 10px; bottom: 10px;
  width: auto; max-height: 70vh; overflow-y: auto;
}

/* Collapse all 2+ column grids to single column on narrow screens */
@media (max-width: 820px) {
  div[style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
    gap: 32px !important;
  }
  /* Unstick anything that becomes awkward on mobile */
  div[style*="position: sticky"] {
    position: static !important;
  }
  /* Padding collapses for big desktop sections */
  section[style*="padding: 140px"] {
    padding: 80px 0 !important;
  }
  section[style*="padding: 56px"] {
    padding: 32px 20px !important;
  }
  /* News bold horizontal scroller — make touch-draggable on mobile */
  .news-mobile-scroll {
    overflow-x: auto !important;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
}

[data-device="mobile"] div[style*="grid-template-columns"] {
  grid-template-columns: 1fr !important;
  gap: 24px !important;
}
[data-device="mobile"] div[style*="position: sticky"] {
  position: static !important;
}
[data-device="mobile"] section[style*="padding: 140px"] {

}

}

}
/* Mobile: CTA & button rows wrap */

[data-device="mobile"] div[style*="display: flex"][style*="gap: 12"] {
  flex-wrap: wrap !important;
  justify-content: center;
}
/* Clamp any SVG maps to container */

  height: auto !important;
}

}

/* ==== MOBILE device-preview helpers (JS short-circuits the heavy scroll-jack components) ==== */

[data-device="mobile"] .pinned { height: auto !important; }

}

}

  .pinned { height: auto !important; }
  .pinned .sticky {
    position: static !important; height: auto !important;
    min-height: auto !important; padding: 60px 20px !important;

  svg[viewBox] { max-width: 100%; height: auto; }

  border-radius: 4px; padding: 20px;
}

.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { scrollbar-width: none; }
</style>

// ==== components/hooks.jsx ====
/* Shared hooks + utilities for scroll-driven sections */

const { useState, useEffect, useRef, useLayoutEffect, useMemo, useCallback } = React;

// Clamp + interpolate helpers
const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const smooth = (t) => t * t * (3 - 2 * t);

// Returns how far you've scrolled through the element.
// 0 = element top just hit viewport bottom
// 1 = element bottom just left viewport top
function useScrollProgress(ref, opts = {}) {
  const [p, setP] = useState(0);
  useEffect(() => {
    if (!ref.current) return;
    let raf = 0;
    const tick = () => {
      const el = ref.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const vh = window.innerHeight;
      // progress through the pinned element
      const total = rect.height - vh;
      const scrolled = -rect.top;
      const prog = clamp(scrolled / Math.max(1, total));
      setP(prog);
      raf = 0;
    };
    const onScroll = () => {if (!raf) raf = requestAnimationFrame(tick);};
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    tick();
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [ref]);
  return p;
}

// Reveal on enter viewport
function useInView(ref, margin = '0px 0px -15% 0px') {
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) setInView(true);
    }, { rootMargin: margin });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, margin]);
  return inView;
}

// Map progress range to 0..1
function range(p, a, b) {return clamp((p - a) / (b - a));}

// Detect mobile — either real narrow viewport or explicit device preview
function useIsMobile() {
  const [m, setM] = useState(false);
  useEffect(() => {
    const check = () => {
      const device = document.documentElement.getAttribute('data-device');
      setM(device === 'mobile' || window.innerWidth < 820);
    };
    check();
    window.addEventListener('resize', check);
    const obs = new MutationObserver(check);
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-device'] });
    return () => {window.removeEventListener('resize', check);obs.disconnect();};
  }, []);
  return m;
}

Object.assign(window, { useScrollProgress, useInView, range, clamp, lerp, smooth, useIsMobile });

// Bounding box for our viewport in lon/lat — covers MENA
const MAP_BBOX = { west: -5, east: 70, north: 45, south: 5 };

/* Build a simple equirectangular projection manually so we don't need d3-geo. */
function project([lon, lat], W = 920, H = 620) {
  const { west, east, north, south } = MAP_BBOX;
  const x = (lon - west) / (east - west) * W;
  const y = (north - lat) / (north - south) * H;
  return [x, y];
}

function polygonToPath(rings) {
  return rings.map((ring) => {
    return ring.map((pt, i) => {
      const [x, y] = project(pt);
      return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }).join('') + 'Z';
  }).join('');
}

function geometryToPath(geom) {
  if (!geom) return '';
  if (geom.type === 'Polygon') return polygonToPath(geom.coordinates);
  if (geom.type === 'MultiPolygon') {
    return geom.coordinates.map((rings) => polygonToPath(rings)).join('');
  }
  return '';
}

/* Use TopoJSON — fetch and decode.
   We'll load from cdn.jsdelivr.net world-atlas@2/countries-50m.json
   and decode inline (mini decoder below). */

// Minimal topojson decoder (feature extraction)
function decodeTopology(topology, objectName) {
  const o = topology.objects[objectName];
  const arcs = topology.arcs;
  const { scale = [1, 1], translate = [0, 0] } = topology.transform || {};
  function decodeArc(i) {
    const reverse = i < 0;
    if (reverse) i = ~i;
    const arc = arcs[i];
    const out = [];
    let x = 0,y = 0;
    for (const [dx, dy] of arc) {
      x += dx;y += dy;
      out.push([x * scale[0] + translate[0], y * scale[1] + translate[1]]);
    }
    return reverse ? out.reverse() : out;
  }
  function assembleRing(arcIndices) {
    const ring = [];
    for (let k = 0; k < arcIndices.length; k++) {
      const seg = decodeArc(arcIndices[k]);
      if (k > 0) seg.shift(); // avoid duplicate join point
      ring.push(...seg);
    }
    return ring;
  }
  function assemblePolygon(rings) {
    return rings.map(assembleRing);
  }
  return o.geometries.map((g) => {
    let coords = null;
    if (g.type === 'Polygon') coords = assemblePolygon(g.arcs);else
    if (g.type === 'MultiPolygon') coords = g.arcs.map((p) => assemblePolygon(p));
    return { id: g.id, properties: g.properties || {}, type: g.type, coordinates: coords };
  });
}

// Cache topology in window
let _topoPromise = null;
function loadCountries() {
  if (_topoPromise) return _topoPromise;
  _topoPromise = fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-50m.json').
  then((r) => r.json()).
  then((topo) => decodeTopology(topo, 'countries'));
  return _topoPromise;
}

function useCountries() {
  const [features, setFeatures] = React.useState(null);
  React.useEffect(() => {loadCountries().then(setFeatures);}, []);
  return features;
}

  784: [54.5, 24], // UAE
  512: [56, 21], // Oman
  792: [35, 39], // Turkey
  760: [38, 35], // Syria
  368: [44, 33], // Iraq
  364: [53, 32], // Iran
  400: [36.5, 31.2], // Jordan

  434: [18, 27], // Libya
  376: [35, 31.5], // Israel
  422: [35.8, 34], // Lebanon
  48: [50.5, 26] // Bahrain
};

function labelPos(id) {
  const c = LABEL_COORDS[id];
  if (!c) return [0, 0];
  return project(c);
}

function RealMap({ hoveredId, selectedId, onHover, onSelect, revealIds, renderScale = 1 }) {
  const features = useCountries();
  if (!features) {
    return (
      <div style={{
        width: '100%', aspectRatio: '920/620', background: '#E6EEEA',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#A7A6A6', fontFamily: 'var(--mono)', fontSize: 12
      }}>LOADING MAP…</div>);

  }

  const W = 920,H = 620;
  // Viewbox is slightly cropped to show MENA tightly
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block', background: '#E6EEEA', borderRadius: 8 }}>
      {/* Sea pattern — subtle horizontal lines */}
      <defs>
        <pattern id="sea" width="8" height="8" patternUnits="userSpaceOnUse">
          <rect width="8" height="8" fill="#E6EEEA" />
        </pattern>
      </defs>

      {/* All countries — only render if intersecting our region */}
      {features.map((f, idx) => {
        const id = f.id;
        const covered = COVERED[id];
        const isHover = hoveredId === id;
        const isSelected = selectedId === id;
        const d = geometryToPath(f);
        if (!d) return null;
        // Cull features clearly outside MENA by checking label or first point
        // Quick cull using first coordinate
        const firstPt = f.type === 'Polygon' ? f.coordinates[0][0] : f.coordinates[0][0][0];
        if (firstPt) {
          const [lon, lat] = firstPt;
          if (lon < MAP_BBOX.west - 20 || lon > MAP_BBOX.east + 20 ||
          lat < MAP_BBOX.south - 20 || lat > MAP_BBOX.north + 20) return null;
        }

        let fill,opacity = 1;
        if (covered) {
          if (isSelected || isHover) fill = '#2E7D5A';else
          fill = '#D7D9B6';
          if (revealIds && !revealIds.has(id)) {fill = '#ECECEC';opacity = 0.6;}
        } else {
          fill = '#ECECEC';
        }

        return (
          <path key={id || 'f' + idx} d={d}
          fill={fill} opacity={opacity}
          stroke="#FFFFFF" strokeWidth="0.8"
          vectorEffect="non-scaling-stroke"
          style={{ cursor: covered ? 'pointer' : 'default', transition: 'fill 220ms ease, opacity 220ms ease' }}
          onMouseEnter={() => covered && onHover && onHover(id)}
          onMouseLeave={() => covered && onHover && onHover(null)}
          onClick={() => covered && onSelect && onSelect(id)} />);


      })}

      {/* Labels */}
      {Object.keys(COUNTRY_LABELS).map((idStr) => {
        const id = +idStr;
        const [x, y] = labelPos(id);
        if (!x) return null;
        return (
          <text key={'l' + id} x={x} y={y} textAnchor="middle"
          fontFamily="var(--mono)" fontSize="11" fontWeight="500"
          fill="#B8B8B8" style={{ letterSpacing: '0.12em', pointerEvents: 'none' }}>
            {COUNTRY_LABELS[id]}
          </text>);

      })}
      {Object.entries(COVERED).map(([idStr, c]) => {
        const id = +idStr;
        const [x, y] = labelPos(id);
        if (!x) return null;
        const isHover = hoveredId === id;
        const isSelected = selectedId === id;
        const isSmall = ['KWT', 'QAT', 'UAE', 'BHR'].includes(c.code);
        const label = c.name.toUpperCase();
        let color;
        if (isSelected || isHover) color = '#FFFFFF';else
        color = '#6B7340';

        if (isSmall && !(isSelected || isHover)) {
          const w = c.code === 'KWT' ? 42 : c.code === 'UAE' ? 32 : c.code === 'QAT' ? 38 : 38;
          return (
            <g key={'l' + id} style={{ pointerEvents: 'none' }}>
              <rect x={x - w / 2} y={y - 7} width={w} height={12} fill="#D7D9B6" stroke="#FFFFFF" strokeWidth="0.8" />
              <text x={x} y={y + 2} textAnchor="middle"
              fontFamily="var(--mono)" fontSize="7.5" fontWeight="700"
              fill="#6B7340" style={{ letterSpacing: '0.1em' }}>{label}</text>
            </g>);

        }
        return (
          <text key={'l' + id} x={x} y={y} textAnchor="middle"
          fontFamily="var(--mono)" fontSize="12" fontWeight="700"
          fill={color} style={{ letterSpacing: '0.14em', pointerEvents: 'none', transition: 'fill 180ms ease' }}>
            {label}
          </text>);

      })}
    </svg>);

}

/* ========= BOLD ========= */
function MapBold() {
  const ref = React.useRef(null);
  const p = useScrollProgress(ref);
  const coveredIds = [818, 682, 414, 634, 784, 512]; // EGY, KSA, KWT, QAT, UAE, OMN
  const tReveal = range(p, 0.1, 0.4);
  const tCycle = range(p, 0.42, 1.0);
  const cycleIdx = Math.min(Math.floor(tCycle * coveredIds.length), coveredIds.length - 1);
  const activeId = p > 0.42 ? coveredIds[cycleIdx] : null;
  const [userHover, setUserHover] = React.useState(null);
  const hovered = userHover || activeId;

  // Reveal set based on progress
  const revealIds = new Set();
  const revealCount = Math.floor(tReveal * (coveredIds.length + 0.5));
  for (let i = 0; i < revealCount; i++) revealIds.add(coveredIds[i]);
  // After reveal phase, all are in
  if (p > 0.4) coveredIds.forEach((id) => revealIds.add(id));

  return (
    <section ref={ref} className="pinned" style={{ height: '380vh' }}>
      <div className="sticky" style={{ background: '#F7F7F5', display: 'flex', flexDirection: 'column', padding: '56px' }}>

            <div style={{ color: '#FF8200' }}>{String(Math.round(p * 100)).padStart(3, '0')}% · SCROLL</div>
          </div>
        </div>
        <div style={{ flex: 1, position: 'relative', background: '#FFFFFF', borderRadius: 12, boxShadow: '0 2px 20px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
            <div style={{ width: '100%', maxHeight: '100%' }}>
              <RealMap
                hoveredId={hovered}
                onHover={setUserHover}
                revealIds={p < 0.42 ? revealIds : null} />
            </div>
          </div>
          {hovered && <HoverTooltip id={hovered} />}
        </div>
        <div style={{
          display: 'flex', gap: 4, marginTop: 20, justifyContent: 'center'
        }}>

            const c = COVERED[id];

                letterSpacing: '0.08em'
              }}>{c.code}</div>);

          })}
        </div>
      </div>
    </section>);

}

/* Mobile app — animated reveals + micro-motion. No scroll-jacking. */

const { useState: mUseState, useEffect: mUseEffect, useRef: mUseRef } = React;

/* ========= REVEAL WRAPPER — fade up on scroll into view ========= */
function Reveal({ children, delay = 0, y = 24, ...rest }) {
  const ref = mUseRef(null);
  const [on, setOn] = mUseState(false);
  mUseEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {setOn(true);io.disconnect();}
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: on ? 1 : 0,
      transform: on ? 'translateY(0)' : `translateY(${y}px)`,
      transition: `opacity .7s cubic-bezier(.2,.7,.2,1) ${delay}s, transform .8s cubic-bezier(.2,.7,.2,1) ${delay}s`,
      ...rest.style
    }} {...rest}>
      {children}
    </div>);

}

/* Stagger — wraps children in Reveal with incrementing delay */
function Stagger({ children, base = 0, step = 0.08, y = 20 }) {
  return React.Children.map(children, (c, i) =>
  <Reveal delay={base + i * step} y={y}>{c}</Reveal>
  );
}

/* ========= ANIMATED COUNTER ========= */
function Counter({ to, suffix = '', duration = 1400, format }) {
  const ref = mUseRef(null);
  const [val, setVal] = mUseState(0);
  mUseEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(to * eased));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    }, { threshold: 0.4 });
    io.observe(el);
    return () => io.disconnect();
  }, [to]);
  return <span ref={ref}>{format ? format(val) : val.toLocaleString()}{suffix}</span>;
}

  const [scrolled, setScrolled] = mUseState(false);
  mUseEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);

/* ========= TERMINAL — live-updating mini chart + ticker row ========= */
function MTerminal() {
  const [tickIdx, setTickIdx] = mUseState(0);
  const ref = mUseRef(null);
  const [inView, setInView] = mUseState(false);

  mUseEffect(() => {
    const io = new IntersectionObserver(([e]) => setInView(e.isIntersecting), { threshold: 0.2 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, []);

  mUseEffect(() => {
    if (!inView) return;
    const id = setInterval(() => setTickIdx((i) => i + 1), 900);
    return () => clearInterval(id);
  }, [inView]);

  // Chart that morphs over time
  const basePath = [78, 72, 66, 58, 52, 50, 46, 42, 38, 34, 30, 24, 20, 18, 16];
  const offset = tickIdx % 30;
  const pts = basePath.map((y, i) => {
    const phase = Math.sin((i + offset) * 0.5 + tickIdx * 0.2) * 3;
    return [i * (320 / (basePath.length - 1)), y + phase];
  });
  const pathD = pts.map(([x, y], i) => (i ? 'L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1)).join(' ');
  const closedD = pathD + ` L 320,100 L 0,100 Z`;

  // Live price flicker
  const basePrice = 28412.60;
  const price = (basePrice + Math.sin(tickIdx * 0.3) * 18).toFixed(2);
  const delta = (1.24 + Math.sin(tickIdx * 0.3) * 0.05).toFixed(2);

  return (
    <section ref={ref} style={{ padding: '72px 22px', background: 'var(--bg)' }}>
      <Reveal><div className="section-label">The terminal</div></Reveal>
      <Reveal delay={0.1}>
        <h2 style={{ fontFamily: 'var(--serif)', fontSize: 34, lineHeight: 1.05, letterSpacing: '-0.02em', margin: '12px 0 20px' }}>
          A workbench <span style={{ fontStyle: 'italic', color: 'var(--accent)' }}>built</span> for the desk.
        </h2>
      </Reveal>

      <Reveal delay={0.2} y={24}>
        <div style={{
          borderRadius: 10, overflow: 'hidden', border: '1px solid var(--rule)',
          background: 'var(--bg-2)', marginBottom: 24,
          boxShadow: '0 20px 50px rgba(0,0,0,0.3)'
        }}>
          <div style={{
            padding: '10px 14px', borderBottom: '1px solid var(--rule)',
            display: 'flex', justifyContent: 'space-between',
            fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--ink-dim)'
          }}>
            <span>EFG · Research</span>
            <span style={{ color: 'var(--accent)', display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{
                width: 5, height: 5, borderRadius: '50%', background: 'var(--accent)',
                animation: 'livepulse 1.4s infinite'
              }} />
              LIVE
            </span>
          </div>
          <div style={{ padding: 14 }}>
            <div style={{ fontSize: 10, color: 'var(--ink-dim)', fontFamily: 'var(--mono)', marginBottom: 4 }}>EGX 30 · INDEX</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 24, display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <span style={{ fontVariantNumeric: 'tabular-nums' }}>{price}</span>
              <span style={{ fontSize: 12, color: 'var(--green)', fontFamily: 'var(--mono)' }}>+{delta}%</span>
            </div>
            <svg viewBox="0 0 320 100" style={{ width: '100%', height: 90, marginTop: 10 }}>
              <defs>
                <linearGradient id="mg" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.35" />
                  <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
                </linearGradient>
              </defs>
              <path d={closedD} fill="url(#mg)" style={{ transition: 'd .9s ease' }} />
              <path d={pathD} fill="none" stroke="var(--accent)" strokeWidth="1.5" style={{ transition: 'd .9s ease' }} />
              {/* end dot */}
              <circle
                cx={pts[pts.length - 1][0]}
                cy={pts[pts.length - 1][1]}
                r="3" fill="var(--accent)">
                
                <animate attributeName="r" values="3;5;3" dur="1.4s" repeatCount="indefinite" />
              </circle>
            </svg>
          </div>
          <div style={{ borderTop: '1px solid var(--rule)' }}>
            {[['COMI', '+2.14%', 'BUY'], ['EMAAR', '+0.87%', 'BUY'], ['STC', '-0.42%', 'HOLD']].map((r, i) => {
              const flashing = tickIdx % 3 === i;
              return (
                <div key={r[0]} style={{

                  <span style={{ fontSize: 10, color: 'var(--accent)', fontFamily: 'var(--mono)' }}>{r[2]}</span>
                </div>);

            })}
          </div>
        </div>
      </Reveal>

      {[['Unified search', 'One prompt across reports, filings, earnings transcripts.'],
      ['Live conviction deltas', 'Watch analyst stances shift the moment they update.'],

function ScrollRail({ chapters }) {
  const [active, setActive] = React.useState(0);
  React.useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY + window.innerHeight / 2;
      let found = 0;
      chapters.forEach((c, i) => {
        const el = document.getElementById(c.id);
        if (el && el.offsetTop <= y) found = i;
      });
      setActive(found);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [chapters]);
  return (
    <div className="scroll-rail">
      {chapters.map((c, i) =>
      <div key={c.id} className={`chapter ${i === active ? 'active' : ''}`}
      onClick={() => document.getElementById(c.id).scrollIntoView({ behavior: 'auto' })}>
          <span>{String(i + 1).padStart(2, '0')}</span>
          <span className="tick" />
          <span>{c.label}</span>
        </div>
      )}
    </div>);

}

function TweakToggle({ value, onChange, options = ['safe', 'bold'] }) {
  return (
    <div className="tweak-toggle">
      {options.map((opt) =>
      <button key={opt} className={value === opt ? 'on' : ''} onClick={() => onChange(opt)}>
          {opt}
        </button>
      )}
    </div>);

}

function TweaksPanel({ visible, state, setState }) {
  const allToBold = () => setState({
    heroVariant: 'bold', coverageVariant: 'bold', mapVariant: 'bold',
    newsVariant: 'bold', statsVariant: 'bold', terminalVariant: 'bold'
  });
  const allToSafe = () => setState({
    heroVariant: 'safe', coverageVariant: 'safe', mapVariant: 'safe',
    newsVariant: 'safe', statsVariant: 'safe', terminalVariant: 'safe'
  });
  if (!visible) return null;
  return (
    <div className="tweaks-panel">
      <h3>Tweaks · Section Variants</h3>
      <div className="tweak-row"><label>Device</label>
        <TweakToggle value={state.device || 'desktop'} onChange={(v) => setState({ device: v })} options={['desktop', 'mobile']} />
      </div>
      <div className="tweak-row"><label>Theme</label>
        <TweakToggle value={state.theme || 'dark'} onChange={(v) => setState({ theme: v })} options={['dark', 'light']} />
      </div>
      <div className="tweak-row"><label>Hero</label>
        <TweakToggle value={state.heroVariant} onChange={(v) => setState({ heroVariant: v })} />
      </div>
      <div className="tweak-row"><label>Coverage</label>
        <TweakToggle value={state.coverageVariant} onChange={(v) => setState({ coverageVariant: v })} />
      </div>
      <div className="tweak-row"><label>Map</label>
        <TweakToggle value={state.mapVariant} onChange={(v) => setState({ mapVariant: v })} />
      </div>
      <div className="tweak-row"><label>News</label>
        <TweakToggle value={state.newsVariant} onChange={(v) => setState({ newsVariant: v })} />
      </div>
      <div className="tweak-row"><label>Stats</label>
        <TweakToggle value={state.statsVariant} onChange={(v) => setState({ statsVariant: v })} />
      </div>
      <div className="tweak-row"><label>Terminal</label>
        <TweakToggle value={state.terminalVariant} onChange={(v) => setState({ terminalVariant: v })} />
      </div>
      <div className="tweak-row" style={{ gap: 8 }}>
        <button className="btn btn-ghost" style={{ padding: '6px 10px', fontSize: 11 }} onClick={allToSafe}>All safe</button>
        <button className="btn btn-primary" style={{ padding: '6px 10px', fontSize: 11 }} onClick={allToBold}>All bold</button>
      </div>
      <div style={{ marginTop: 10, fontSize: 10, color: 'var(--ink-faint)', fontFamily: 'var(--mono)', lineHeight: 1.5 }}>
        Safe = reveal-on-scroll. Bold = pinned / horizontal / cinematic.
      </div>
    </div>);

}

function App() {
  const [tweakMode, setTweakMode] = React.useState(false);
  const [state, setStateInternal] = React.useState(TWEAK_DEFAULTS);
  const setState = (patch) => setStateInternal((s) => {
    const next = { ...s, ...patch };
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
    return next;
  });

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', state.theme || 'dark');
    document.documentElement.setAttribute('data-device', state.device || 'desktop');
  }, [state.theme, state.device]);

  // Mobile view — entirely separate tree, no scroll-jacking
  const isMobile = state.device === 'mobile';

  const chapters = [
  { id: 'hero', label: 'Hero' },
  { id: 'coverage', label: 'Coverage' },
  { id: 'map', label: 'Map' },
  { id: 'news', label: 'News' },
  { id: 'stats', label: 'Numbers' },
  { id: 'terminal', label: 'Terminal' },
  { id: 'cta', label: 'Access' }];


  return (
    <>
      {isMobile ?
      <>
          <TweaksPanel visible={tweakMode} state={state} setState={setState} />
          <MobileApp />
        </> :

      <>
      <Nav />
      <ScrollRail chapters={chapters} />
      <TweaksPanel visible={tweakMode} state={state} setState={setState} />

      <div id="hero" data-screen-label="01 Hero">
        {state.heroVariant === 'bold' ? <HeroBold /> : <HeroSafe />}
      </div>

      <div style={{ background: 'var(--bg-2)', padding: '0 56px' }}>
        <div style={{ maxWidth: 1360, margin: '0 auto' }}>
          <Ticker />
        </div>
      </div>

      <div id="coverage" data-screen-label="02 Coverage">
        {state.coverageVariant === 'bold' ? <CoverageBold /> : <CoverageSafe />}
      </div>

      <div id="map" data-screen-label="03 Map">
        {state.mapVariant === 'bold' ? <MapBold /> : <MapSafe />}
      </div>

      <div id="news" data-screen-label="04 News">
        {state.newsVariant === 'bold' ? <NewsBold /> : <NewsSafe />}
      </div>

      <div id="stats" data-screen-label="05 Stats">
        {state.statsVariant === 'bold' ? <StatsBold /> : <StatsSafe />}
      </div>

      <div id="terminal" data-screen-label="06 Terminal">
        {state.terminalVariant === 'bold' ? <TerminalBold /> : <TerminalSafe />}
      </div>

      <div id="cta" data-screen-label="07 CTA">
        <CTASection />
      </div>
      </>
      }
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
